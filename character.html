<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>— — —</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #f72585;
    --black: #0a0a0a;
    --white: #f0ece4;
    --dim: #1a1a1a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  .grain {
    pointer-events: none;
    position: fixed; inset: 0; z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.18;
  }

  .stage {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
  }

  .scanlines {
    pointer-events: none;
    position: fixed; inset: 0; z-index: 99;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
  }

  .char-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .bubble {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 1.4vw, 14px);
    color: var(--black);
    background: var(--pink);
    padding: 14px 20px;
    line-height: 1.65;
    white-space: pre;
    position: relative;
    border: 2px solid var(--black);
    letter-spacing: 0.02em;
    min-width: 260px;
    animation: bubblein 0.3s ease;
  }

  .bubble::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 14px solid var(--pink);
  }

  .bubble::before {
    content: '';
    position: absolute;
    bottom: -17px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 16px solid var(--black);
  }

  @keyframes bubblein {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .char-ascii {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 1.1vw, 12px);
    line-height: 1.38;
    color: var(--white);
    white-space: pre;
    margin-top: 18px;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .char-ascii.tired { color: #666; }
  .char-ascii.excess { color: var(--pink); text-shadow: 0 0 12px rgba(247,37,133,0.6); }

  .blink { animation: blink 1.1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div class="grain"></div>
<div class="scanlines"></div>

<div class="stage">
  <div class="char-container">
    <div class="bubble" id="bubble">click..cleck
that's it, some
amazing pixels here
def changed
someone's life</div>
    <pre class="char-ascii" id="char"></pre>

</div>

let f = 0;
let energy = 80;
let isTired = false;

const charEl = document.getElementById('char');
const bubbleEl = document.getElementById('bubble');

function render() {
  const pool = isTired ? tiredFrames : frames;
  charEl.textContent = pool[f % pool.length].join('\n');
  charEl.className = 'char-ascii' + (isTired ? ' tired' : '') + (energy > 90 ? ' excess' : '');

  if (f % 6 === 0) {
    const idx = Math.floor(f / 6) % bubbles.length;
    bubbleEl.style.animation = 'none';
    bubbleEl.offsetHeight;
    bubbleEl.style.animation = 'bubblein 0.3s ease';
    bubbleEl.textContent = bubbles[idx];
  }

  f++;
}

function drainEnergy() {
  if (energy > 12) {
    energy -= 0.4;
    isTired = energy < 40;
  }
}

setInterval(render, 380);
setInterval(drainEnergy, 600);

document.addEventListener('click', () => {
  energy = Math.min(100, energy + 12);
  isTired = false;
});
